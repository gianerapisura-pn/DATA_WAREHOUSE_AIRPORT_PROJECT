services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airport_dw
      POSTGRES_USER: airport_dw
      POSTGRES_PASSWORD: airport_dw
    ports:
      - "5433:5432"
    volumes:
      - airport_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airport_dw -d airport_dw"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://airport_dw:airport_dw@postgres:5432/airport_dw
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ELIGIBILITY_DELAY_MINUTES: 180
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

volumes:
  airport_pgdata:
